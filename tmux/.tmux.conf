# zsh is my default shell
set -g default-shell /bin/zsh

# panes theming
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# terminal and clipboard
set -g default-terminal "tmux-256color"

# WSL/Alacritty currently reports xterm-256color outside tmux
set -as terminal-features ",xterm-256color:RGB"

set -g mouse off
set -g focus-events off
set -g set-clipboard on

# Keep this off while avoiding Alacritty/WSL redraw corruption
set -g allow-passthrough off

# Extended key reporting can corrupt redraws/statuslines on some terminal/tmux/app combos
set -s extended-keys off

# disable noisy terminal alerts
set -g bell-action any
set -g visual-bell off


# make C-a the prefix, and make C-a C-a send C-a through
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# optional: make C-b pass through to programs
bind-key -n C-b send-prefix

# splits keep the current working directory
bind - split-window -h -c "#{pane_current_path}"
bind = split-window -v -c "#{pane_current_path}"

bind M-- split-window -h -c "#{pane_current_path}"
bind M-= split-window -v -c "#{pane_current_path}"

unbind %


# bind copy mode to M-[ / M-]
bind -n M-[ copy-mode
bind -n M-] copy-mode


# vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

bind -T copy-mode-vi    MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-emacs MouseDragEnd1Pane send -X copy-selection-no-clear


set -s escape-time 0
set -g repeat-time 500

# windows
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# bind alt-w to choose window selector
bind-key -n M-w choose-session

# Use alt-number to go to window
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

# move between windows with alt-n/p
bind -n M-p previous-window

bind -n M-n next-window

# panes
bind -n C-h select-pane -L

bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

bind -n M-Left swap-pane -U

bind -n M-Right swap-pane -D

# alt-x to kill pane
bind -n M-x kill-pane
bind b break-pane

# platform helpers
if-shell 'uname -s | grep -q Darwin' {
    bind -n M-e run-shell 'open "#{pane_current_path}"'
    bind -n M-v display-message "tmux-paste-image is WSL-only"

} {

    bind -n M-e run-shell "explorer.exe \"$(wslpath -w '#{pane_current_path}')\" 2>/dev/null || true"
    bind -n M-v run-shell "~/dotfiles/tmux/scripts/tmux-paste-image.sh #{pane_id}"
}

# -------------------------------------------------------------------
# Nested tmux passthrough: M-Shift-<key> sends M-<key> to the inner
# tmux session so the outer session's M-<key> binding does not eat it.
# Only active when the focused pane is running another tmux; otherwise
# the chord goes to the pane application as a normal M-<key>.
# -------------------------------------------------------------------

# prefix-less letter bindings
bind-key -n M-W send-keys M-w
bind-key -n M-P send-keys M-p
bind-key -n M-N send-keys M-n
bind-key -n M-H send-keys M-h
bind-key -n M-J send-keys M-j
bind-key -n M-K send-keys M-k
bind-key -n M-L send-keys M-l
bind-key -n M-X send-keys M-x
bind-key -n M-E send-keys M-e
bind-key -n M-V send-keys M-v

# prefix-less symbol binding (M-] copy-mode -> M-})
bind-key -n M-\} send-keys M-]
# prefix-less symbol binding (M-[ copy-mode -> M-{)
bind-key -n M-\{ send-keys M-[

# prefix-less number bindings (shift+number on US layout)
bind-key -n M-! send-keys M-1
bind-key -n M-@ send-keys M-2
bind-key -n M-# send-keys M-3
bind-key -n M-$ send-keys M-4
bind-key -n M-% send-keys M-5
bind-key -n M-) send-keys M-0

# prefix-less arrow bindings
bind-key -n M-S-Left  send-keys M-Left
bind-key -n M-S-Right send-keys M-Right

# prefix-based split bindings (inner tmux needs its C-a prefix first)
bind M-_ send-keys C-a M--
bind M-+ send-keys C-a M-=

# reload config

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind R refresh-client -S \; display-message "tmux display refreshed"

# pane styling reset hooks
set-hook -g pane-focus-in 'set-window-option -u window-status-format'
set-hook -g pane-exited 'set-window-option -u window-status-format'

# yank
set -g @yank_with_mouse on
set -g @override_copy_command 'true'


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Disabled because tmux-oasis was causing Alacritty+WSL status redraw corruption.
# set -g @plugin 'uhs-robert/tmux-oasis'
# set -g @oasis_flavor 'lagoon_dark'
# set -g @oasis_mode_format 'full'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'

set -g @continuum-restore 'on'


run '~/.tmux/plugins/tpm/tpm'


# -------------------------------------------------------------------
# WSL/Alacritty-safe statusline
# No Nerd Font glyphs, no powerline arrows, no shell commands, no clock.
# Looks nicer than default but avoids the redraw corruption.
# -------------------------------------------------------------------


set -g status on
set -g status-position bottom
set -g status-interval 0
set -g status-justify left

set -g status-style 'bg=colour236,fg=colour250'

set -g status-left-length 60
set -g status-right-length 120

# Left: prefix indicator + session name
set -g status-left '#[fg=colour236,bg=colour110,bold] #{?client_prefix,PREFIX,TMUX} #[fg=colour250,bg=colour238,nobold] #S #[default] '


# Window list
set -g window-status-separator ' '

set -g window-status-format '#[fg=colour244,bg=colour236] #I:#W#F '

set -g window-status-current-format '#[fg=colour236,bg=colour150,bold] #I:#W#F #[default]'

# Right: host + current command + current directory basename
set -g status-right '#[fg=colour244]#H #[fg=colour240]| #[fg=colour250]#{pane_current_command} #[fg=colour240]| #[fg=colour250]#{b:pane_current_path} '
