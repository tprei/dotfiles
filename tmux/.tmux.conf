# zsh is my default shell
set -g default-shell /bin/zsh

# panes theming
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# terminal and clipboard
set -g default-terminal "tmux-256color"
set -gu terminal-features
set -g terminal-features[3] "xterm-256color:RGB"
set -g terminal-features[4] "alacritty:RGB"
set -g terminal-features[5] "xterm*:extkeys"
set -g terminal-features[6] "alacritty:extkeys"
set -g terminal-features[7] "xterm-ghostty:RGB"
set -g terminal-features[8] "xterm-ghostty:extkeys"
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u

# disable noisy terminal alerts
set -g bell-action any
set -g visual-bell off

# make C-a the prefix, and make C-b send the prefix through
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key -n C-b send-prefix

# splits keep the current working directory
bind - split-window -h -c "#{pane_current_path}"
bind = split-window -v -c "#{pane_current_path}"
unbind %

# bind copy mode to M-]
bind -n M-] copy-mode

# vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi    MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-emacs MouseDragEnd1Pane send -X copy-selection-no-clear

set -s escape-time 0
set -g repeat-time 500

# windows
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# bind alt-w to choose window selector
bind-key -n M-w choose-window

# Use alt-number to go to pane
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

# move between windows w/ alt-n/p
bind -n M-p previous-window
bind -n M-n next-window

# panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5
bind -n M-Left swap-pane -U
bind -n M-Right swap-pane -D

# alt-x to kill pane
bind -n M-x kill-pane
bind b break-pane

# platform helpers
if-shell 'uname -s | grep -q Darwin' {
    bind -n M-e run-shell 'open "#{pane_current_path}"'
    bind -n M-v display-message "tmux-paste-image is WSL-only"
} {
    bind -n M-e run-shell "explorer.exe \"$(wslpath -w '#{pane_current_path}')\" 2>/dev/null || true"
    bind -n M-v run-shell "~/dotfiles/tmux/scripts/tmux-paste-image.sh #{pane_id}"
}

# reload config
bind r source-file ~/.tmux.conf

# pane styling
set-hook -g pane-focus-in 'set-window-option -u window-status-format'
set-hook -g pane-exited 'set-window-option -u window-status-format'

# yank
set -g @yank_with_mouse on
set -g @override_copy_command 'true'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor 'lagoon_dark'
set -g @oasis_mode_format 'full'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
