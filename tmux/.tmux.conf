# Terminal and UTF-8 settings
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

bind -n M-e run-shell "explorer.exe \"$(wslpath -w '#{pane_current_path}')\" 2>/dev/null || true"

set -g mouse on
set -g set-clipboard on

# Spawn tg-listener on new session (only if not already running)
set-hook -g session-created 'if-shell "! tmux list-windows -a 2>/dev/null | grep -q tg-listener" "new-window -n tg-listener -d \"cd ~/scripts/telegram-notify && npx tsx src/listener.ts\"" ""'

# Remap super
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# Bind splits to - and =
bind - split-window -h
bind = split-window -v
unbind %
# Vi key mappings
set-window-option -g mode-keys vi
# Faster key repeat
set -s escape-time 0
set -g repeat-time 500
# Navigate panes with Alt+hjkl (no prefix needed)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# Resize panes with Alt+Shift+hjkl
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5
# Swap panes with Alt+Left/Right
bind -n M-Left swap-pane -U
bind -n M-Right swap-pane -D
# Better copy mode (vim-style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Break pane into its own window
bind b break-pane
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf
# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin tmux-plugins/tmux-resurrect
set -g @plugin tmux-plugins/tmux-continuum
set -g @plugin dracula/tmux
set -g @plugin 'tmux-plugins/tmux-yank'

# Dracula
set -g @dracula-plugins "cpu-usage gpu-usage ram-usage"
set -g @dracula-show-empty-plugins false
set -g @dracula-show-powerline true
# it can accept `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, `window`, or any character. 

set -g @dracula-show-left-icon session
set -g @dracula-show-location false

# Othes 1, it can accept any number and 0 disables padding.
set -g @dracula-left-icon-padding 1

set -g @dracula-show-location false

# set -g @plugin "github_username/plugin_name"
# set -g @plugin "github_username/plugin_name#branch"
# set -g @plugin "git@github.com:user/plugin"
# set -g @plugin "git@bitbucket.com:user/plugin"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.tmux/plugins/tpm/tpm"

# Pane styling - override theme defaults to make active pane more obvious
set -g pane-active-border-style "fg=blue,bg=black"
set -g pane-border-style "fg=gray"

# Clear attention indicator when focusing a pane or when a pane process exits
set-hook -g pane-focus-in 'set-window-option -u window-status-format'
set-hook -g pane-exited 'set-window-option -u window-status-format'

